services:
  db:
    image: postgres:16-alpine
    container_name: acessstack_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acessstack}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-acessstack}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: acessstack_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-acessstack}?schema=public
      PORT: ${BACKEND_PORT:-3001}
      JWT_SECRET: local-development-secret-change-me-32chars
      JWT_EXPIRES_IN: 8h
      CORS_ORIGINS: http://localhost:5173
      ADMIN_EMAIL: admin@acessstack.local
      ADMIN_PASSWORD: Admin@123
      MASTER_EMAIL: owner@acessstack.local
      MASTER_PASSWORD: Master@123
      GATE_EMAIL: operator@acessstack.local
      GATE_PASSWORD: Gate@123
      SCANNER_EMAIL: scanner@acessstack.local
      SCANNER_PASSWORD: Scanner@123
      GOVERNANCE_EMAIL: governance@acessstack.local
      GOVERNANCE_PASSWORD: Governance@123
      GATE_START_HOUR: 0
      GATE_END_HOUR: 23
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backup_data:/app/backups

  frontend:
    build:
      context: ./frontend
    container_name: acessstack_frontend
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3001}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  postgres_data:
  backup_data:
